<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>11 Social API (Simulada)</title>
<style>
body { font-family: system-ui, Arial; }
.post { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
.meta { color: #64748b; font-size: .9rem; }
</style>
</head>
<body>
<h1>Mi Timeline</h1>
<div id="feed"></div>
<script>
async function cargarFeed() {
const res = await fetch('https://jsonplaceholder.typicode.com/users/1/posts');
const posts = await res.json();
const feed = document.querySelector('#feed');
feed.innerHTML = posts.slice(0,5).map(p => `
<article class="post">
<div class="meta">@usuario1</div>
<h3>${p.title}</h3>
<p>${p.body}</p>
</article>
`).join('');
}
cargarFeed();
</script>
</body>
</html>
